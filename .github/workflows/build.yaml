name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'

      - name: Extract version
        run: |
          echo "VERSION_NAME=$(grep '^version: ' pubspec.yaml | sed 's/version: //')" >> $GITHUB_ENV

      - run: flutter pub get

      - run: flutter build apk --debug --flavor stable --build-name=${{ env.VERSION_NAME }} --build-number=${{ github.run_number }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: finomi-apk
          path: "**/*.apk"
